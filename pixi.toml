# Auto-generated by scaffold_analysis.py — edit as needed for this analysis.
# This is the pixi environment for the analysis. All scripts run through:
#   pixi run py script.py
#
# To add a dependency: add it below, then `pixi install` from this directory.

[workspace]
name = "h4l_hig"
version = "0.1.0"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64"]

[dependencies]
python = ">=3.11"
pandoc = ">=3.0"
pandoc-crossref = ">=0.3"

# --- Core stack (always needed) ---
[pypi-dependencies]
uproot = ">=5.0"
awkward = ">=2.0"
hist = ">=2.7"
boost-histogram = ">=1.4"
numpy = ">=1.24"
scipy = ">=1.11"
matplotlib = ">=3.8"
mplhep = ">=1.1.0"
vector = ">=1.1"
particle = ">=0.23"
rich = ">=13.0"
# --- Uncomment groups below as needed (Phase 3/4 executors: uncomment what you need) ---
# # Statistical models and fitting
# pyhf = ">=0.7"
# cabinetry = ">=0.6"
# iminuit = ">=2.25"
# # Unbinned likelihood fits
# zfit = ">=0.20"
# # MVA / classification
# xgboost = ">=2.0"
# scikit-learn = ">=1.3"
# # Columnar event processing at scale
# coffea = ">=2024.0"

[tasks]
py = "python"
raw-object-pilot = "python phase1_strategy/src/raw_object_feasibility.py"
raw-pseudodata-regeneration-validate = "python phase1_strategy/src/validate_raw_pseudodata_regeneration_v1.py"
mc-preselection-inventory = "python phase1_strategy/src/mc_preselection_inventory.py"
z-scale-sanity-preflight = "python phase1_strategy/src/z_scale_sanity_preflight.py"
# build-pdf is a convenience helper for quick compilation. The typesetter
# subagent invokes pandoc directly with the specific versioned filename
# (e.g., ANALYSIS_NOTE_4a_v1.md) rather than using this task.
build-pdf = "cd phase5_documentation/outputs && EXTRA_PREAMBLE=''; [ -f analysis_preamble.tex ] && EXTRA_PREAMBLE='--include-in-header=analysis_preamble.tex'; pandoc ANALYSIS_NOTE_5_v1.md -o ANALYSIS_NOTE_5_v1.tex --standalone --include-in-header=../../conventions/preamble.tex $EXTRA_PREAMBLE --number-sections --toc --filter pandoc-crossref --citeproc && python ../../conventions/postprocess_tex.py ANALYSIS_NOTE_5_v1.tex && tectonic ANALYSIS_NOTE_5_v1.tex"
lint-plots = "python conventions/lint_plots.py ."
# --- Analysis tasks: add as you write scripts ---
# Each script gets an independently runnable task.
# The "all" task chains the full sequence — this is the reproducibility contract.
# Example:
#   select = "python phase3_selection/src/apply_selection.py"
#   unfold = "python phase4_inference/src/unfold.py"
#   systematics = "python phase4_inference/src/run_systematics.py"
#   all = "python phase3_selection/src/apply_selection.py && python phase4_inference/src/unfold.py && python phase4_inference/src/run_systematics.py"
